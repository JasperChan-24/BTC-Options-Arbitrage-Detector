version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: btc-arb-backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env  # API keys are in the root .env file
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./data:/app/data  # Persist JSONL execution history (Sync with root data folder)
    networks:
      - arb-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: btc-arb-frontend
    restart: always
    ports:
      - "80:80"       # Public access over port 80
      - "3000:80"     # Map local 3000 to nginx 80 as well
    depends_on:
      - backend
    volumes:
      - ./.htpasswd:/etc/nginx/.htpasswd:ro  # Mount password file as read-only
    networks:
      - arb-network

networks:
  arb-network:
    driver: bridge
